services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gym_dm_bot
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_dm_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    volumes:
      # Mount .env file directly — avoids $ interpolation issues with bcrypt hashes
      - ./backend/.env:/app/.env:ro
    environment:
      # These override the .env file values for Docker networking
      DATABASE_URL: postgresql+asyncpg://gym:gym@db:5432/gym_dm_bot
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
