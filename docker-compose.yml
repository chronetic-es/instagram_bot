services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gym_dm_bot
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_dm_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: postgresql+asyncpg://gym:gym@db:5432/gym_dm_bot
      FRONTEND_URL: ${FRONTEND_URL:-https://REPLACE_WITH_YOUR_DOMAIN}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    depends_on:
      - backend

volumes:
  postgres_data:
