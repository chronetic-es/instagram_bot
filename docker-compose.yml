services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gym_dm_bot
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_dm_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # Override .env values for Docker internal networking
      DATABASE_URL: postgresql+asyncpg://gym:gym@db:5432/gym_dm_bot
      FRONTEND_URL: https://REPLACE_WITH_YOUR_DOMAIN
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend

volumes:
  postgres_data:
